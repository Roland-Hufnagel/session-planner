name: deploy.yml
on:
  push:
    branches:
      - main
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:   # manueller "Run workflow"-Button im Actions-Tab

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: backend/src/main/resources/static

  build-backend:
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: frontend-build
          path: backend/src/main/resources/static

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Build Backend
        run: mvn -B package --file backend/pom.xml

      - uses: actions/upload-artifact@v7
        with:
          name: backend-build
          path: backend/target/backend-0.0.1-SNAPSHOT.jar

  docker:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: backend-build
          path: backend/target

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: rolandhufnagel/session-planner:latest

  deploy:
    runs-on: ubuntu-latest
    needs: docker
    environment:
      name: Live Server
      url: https://session-planner-bdrg.onrender.com/
    steps:
      - name: Trigger server deployment
        run: |
          curl -X POST  ${{ secrets.DEPLOYMENT_WEBHOOK_URL }}